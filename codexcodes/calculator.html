<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculator</title>
  <style>
    :root {
      --bg: #eef2ef;
      --surface: #ffffff;
      --surface-strong: #f6f8f6;
      --text: #17201d;
      --muted: #68736e;
      --border: #d8dfda;
      --accent: #1f6f68;
      --accent-strong: #174f4a;
      --operator: #6f4f1f;
      --danger: #a43c3c;
      --shadow: 0 22px 55px rgba(22, 34, 30, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(145deg, rgba(31, 111, 104, 0.16), transparent 42%),
        linear-gradient(315deg, rgba(111, 79, 31, 0.14), transparent 48%),
        var(--bg);
    }

    main {
      width: min(100%, 380px);
    }

    .calculator {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .display {
      min-height: 154px;
      display: grid;
      align-content: end;
      gap: 10px;
      padding: 24px;
      background: #17201d;
      color: #ffffff;
      text-align: right;
    }

    .history {
      min-height: 24px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.95rem;
      overflow-wrap: anywhere;
    }

    .current {
      min-height: 54px;
      font-size: clamp(2.25rem, 12vw, 3.6rem);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
    }

    button {
      min-height: 72px;
      border: 0;
      border-radius: 0;
      color: var(--text);
      background: var(--surface);
      font: inherit;
      font-size: 1.2rem;
      font-weight: 750;
      cursor: pointer;
    }

    button:hover {
      background: var(--surface-strong);
    }

    button:focus-visible {
      outline: 3px solid rgba(31, 111, 104, 0.38);
      outline-offset: -3px;
    }

    .utility {
      color: var(--accent-strong);
      background: #eef6f4;
    }

    .danger {
      color: var(--danger);
      background: #fbf0f0;
    }

    .operator {
      color: #ffffff;
      background: var(--operator);
    }

    .operator:hover {
      background: #5b4018;
    }

    .equals {
      color: #ffffff;
      background: var(--accent);
    }

    .equals:hover {
      background: var(--accent-strong);
    }

    .wide {
      grid-column: span 2;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    @media (max-width: 420px) {
      body {
        padding: 12px;
      }

      .display {
        min-height: 136px;
        padding: 20px;
      }

      button {
        min-height: 66px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1 class="sr-only">Calculator</h1>
    <section class="calculator" aria-label="Calculator">
      <div class="display" aria-live="polite">
        <div class="history" id="history"></div>
        <div class="current" id="current">0</div>
      </div>

      <div class="keypad">
        <button class="danger" type="button" data-action="clear">AC</button>
        <button class="utility" type="button" data-action="delete">DEL</button>
        <button class="utility" type="button" data-action="percent">%</button>
        <button class="operator" type="button" data-operator="/">/</button>

        <button type="button" data-number="7">7</button>
        <button type="button" data-number="8">8</button>
        <button type="button" data-number="9">9</button>
        <button class="operator" type="button" data-operator="*">x</button>

        <button type="button" data-number="4">4</button>
        <button type="button" data-number="5">5</button>
        <button type="button" data-number="6">6</button>
        <button class="operator" type="button" data-operator="-">-</button>

        <button type="button" data-number="1">1</button>
        <button type="button" data-number="2">2</button>
        <button type="button" data-number="3">3</button>
        <button class="operator" type="button" data-operator="+">+</button>

        <button class="wide" type="button" data-number="0">0</button>
        <button type="button" data-action="decimal">.</button>
        <button class="equals" type="button" data-action="equals">=</button>
      </div>
    </section>
  </main>

  <script>
    const currentDisplay = document.querySelector("#current");
    const historyDisplay = document.querySelector("#history");
    const keypad = document.querySelector(".keypad");

    let currentValue = "0";
    let expressionTokens = [];
    let shouldResetDisplay = false;

    const operatorLabels = {
      "+": "+",
      "-": "-",
      "*": "x",
      "/": "/"
    };

    function formatNumber(value) {
      if (!Number.isFinite(value)) {
        return "Error";
      }

      const rounded = Number.parseFloat(value.toPrecision(12));
      return rounded.toLocaleString("en-US", { maximumFractionDigits: 10 });
    }

    function parseDisplayValue() {
      return Number(currentValue.replace(/,/g, ""));
    }

    function updateDisplay() {
      currentDisplay.textContent = currentValue;
      historyDisplay.textContent = expressionTokens
        .map((token) => typeof token === "number" ? formatNumber(token) : operatorLabels[token])
        .join(" ");
    }

    function inputNumber(number) {
      if (currentValue === "Error" || shouldResetDisplay) {
        currentValue = number;
        shouldResetDisplay = false;
        updateDisplay();
        return;
      }

      currentValue = currentValue === "0" ? number : `${currentValue}${number}`;
      updateDisplay();
    }

    function inputDecimal() {
      if (currentValue === "Error" || shouldResetDisplay) {
        currentValue = "0.";
        shouldResetDisplay = false;
        updateDisplay();
        return;
      }

      if (!currentValue.includes(".")) {
        currentValue = `${currentValue}.`;
        updateDisplay();
      }
    }

    function calculate(first, second, operator) {
      if (operator === "+") {
        return first + second;
      }

      if (operator === "-") {
        return first - second;
      }

      if (operator === "*") {
        return first * second;
      }

      if (operator === "/") {
        return second === 0 ? Number.NaN : first / second;
      }

      return second;
    }

    function evaluateExpression(tokens) {
      const values = [];
      const operators = [];
      const precedence = { "+": 1, "-": 1, "*": 2, "/": 2 };

      function applyTopOperator() {
        const operator = operators.pop();
        const rightValue = values.pop();
        const leftValue = values.pop();
        values.push(calculate(leftValue, rightValue, operator));
      }

      tokens.forEach((token) => {
        if (typeof token === "number") {
          values.push(token);
          return;
        }

        while (
          operators.length > 0 &&
          precedence[operators[operators.length - 1]] >= precedence[token]
        ) {
          applyTopOperator();
        }

        operators.push(token);
      });

      while (operators.length > 0) {
        applyTopOperator();
      }

      return values[0];
    }

    function chooseOperator(operator) {
      if (currentValue === "Error") {
        clearCalculator();
        return;
      }

      if (shouldResetDisplay && expressionTokens.length > 0) {
        expressionTokens[expressionTokens.length - 1] = operator;
      } else {
        expressionTokens.push(parseDisplayValue(), operator);
      }

      shouldResetDisplay = true;
      updateDisplay();
    }

    function runEquals() {
      if (expressionTokens.length === 0 || currentValue === "Error") {
        return;
      }

      const tokens = shouldResetDisplay
        ? expressionTokens.slice(0, -1)
        : [...expressionTokens, parseDisplayValue()];
      const result = evaluateExpression(tokens);
      currentValue = formatNumber(result);
      expressionTokens = [];
      shouldResetDisplay = true;
      updateDisplay();
    }

    function clearCalculator() {
      currentValue = "0";
      expressionTokens = [];
      shouldResetDisplay = false;
      updateDisplay();
    }

    function deleteLastDigit() {
      if (shouldResetDisplay || currentValue === "Error") {
        currentValue = "0";
        shouldResetDisplay = false;
      } else {
        currentValue = currentValue.length > 1 ? currentValue.slice(0, -1) : "0";
      }

      updateDisplay();
    }

    function convertToPercent() {
      if (currentValue === "Error") {
        return;
      }

      currentValue = formatNumber(parseDisplayValue() / 100);
      updateDisplay();
    }

    keypad.addEventListener("click", (event) => {
      const button = event.target.closest("button");

      if (!button) {
        return;
      }

      if (button.dataset.number) {
        inputNumber(button.dataset.number);
      } else if (button.dataset.operator) {
        chooseOperator(button.dataset.operator);
      } else if (button.dataset.action === "decimal") {
        inputDecimal();
      } else if (button.dataset.action === "equals") {
        runEquals();
      } else if (button.dataset.action === "clear") {
        clearCalculator();
      } else if (button.dataset.action === "delete") {
        deleteLastDigit();
      } else if (button.dataset.action === "percent") {
        convertToPercent();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (/^\d$/.test(event.key)) {
        inputNumber(event.key);
      } else if (["+", "-", "*", "/"].includes(event.key)) {
        chooseOperator(event.key);
      } else if (event.key === ".") {
        inputDecimal();
      } else if (event.key === "Enter" || event.key === "=") {
        event.preventDefault();
        runEquals();
      } else if (event.key === "Backspace") {
        deleteLastDigit();
      } else if (event.key === "Escape") {
        clearCalculator();
      } else if (event.key === "%") {
        convertToPercent();
      }
    });

    updateDisplay();
  </script>
</body>
</html>
